<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gry | Szuriken55</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .subpage-content { padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
        
        .back-btn { 
            display: inline-block; margin-bottom: 20px; color: var(--accent); 
            text-decoration: none; font-weight: bold; border: 1px solid var(--accent); 
            padding: 10px 20px; border-radius: 50px; transition: 0.3s; 
        }
        .back-btn:hover { background: var(--accent); color: #000; }

        h1 { margin-bottom: 30px; color: var(--neon-green); font-family: 'Comic Neue', cursive; }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
            margin-top: 20px; 
        }

        .game-item { 
            background: rgba(30, 41, 59, 0.8); 
            border-radius: 20px; 
            overflow: hidden; /* Ważne: ucina zdjęcie do zaokrąglonych rogów */
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: 0.3s;
            text-align: center;
        }

        .game-item:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Styl dla małych zdjęć gier */
        .game-img {
            width: 100%;
            height: 180px;
            object-fit: cover; /* Zdjęcie wypełnia obszar, nie rozciąga się */
            border-bottom: 4px solid var(--accent);
        }

        .game-info { padding: 20px; }
        .game-info h3 { color: var(--accent); margin-bottom: 10px; }
        .game-info p { font-size: 0.95rem; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="subpage-content">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Powrót do Startu</a>
        
        <h1>Moje Top Propozycje:</h1>
        
        <div class="game-grid">
            <div class="game-item">
                <img src="cybbb.webp" alt="Cyberpunk 2077" class="game-img">
                <div class="game-info">
                    <h3>Cyberpunk 2077</h3>
                    <p>Niesamowity klimat Night City i fabuła, która wgniata w fotel.</p>
                </div>
            </div>

            <div class="game-item">
                <img src="witcher3.webp" alt="Wiedźmin 3" class="game-img">
                <div class="game-info">
                    <h3>Wiedźmin 3</h3>
                    <p>Klasyka fantasy. Świat, do którego wracam co najmniej raz w roku.</p>
                </div>
            </div>

            <div class="game-item">
                <img src="cs2logo.webp" alt="Counter Strike 2" class="game-img">
                <div class="game-info">
                    <h3>Counter Strike 2</h3>
                    <p>Moja arena zmagań e-sportowych. Liczy się tylko refleks i taktyka.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
